name: Pulse
options:
  bundleIdPrefix: com.aarya
  deploymentTarget:
    iOS: "17.0"
targets:
  Pulse:
    type: application
    platform: iOS
    sources: [Pulse]
    info:
      path: Pulse/Info.plist
      properties:
        UILaunchScreen: {}
        NSHealthShareUsageDescription: Pulse reads your Apple Watch data to calculate Recovery, Strain and Sleep scores.
        NSCameraUsageDescription: Pulse uses the camera to scan meals and estimate calories.
        NSPhotoLibraryUsageDescription: Pulse can analyze meal photos from your library.
    entitlements:
      path: Pulse/Pulse.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.aarya.pulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarya.pulse
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: PulseWidgetExtension

  PulseWidgetExtension:
    type: app-extension
    platform: iOS
    sources: [PulseWidget, Pulse/WaterStore.swift]
    info:
      path: PulseWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: PulseWidget/PulseWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.aarya.pulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarya.pulse.PulseWidget
        TARGETED_DEVICE_FAMILY: 1
        SKIP_INSTALL: NO
